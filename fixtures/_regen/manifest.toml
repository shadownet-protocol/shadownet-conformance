# Declarative fixture manifest.
#
# Each entry describes exactly one fixture file. The regen CLI:
#   1. Resolves seeds from ../seeds.toml.
#   2. Pipes the resolved spec (JSON) to BOTH the Python emitter
#      (`python -m shadownet_conformance.regen.py_emit <kind>`) and the
#      Go emitter (`fixtures/_regen/go-emit/go-emit <kind>`).
#   3. Diffs the two outputs byte-for-byte.
#   4. On match: writes to `fixtures/<out>`. On mismatch: errors, writes
#      nothing.
#
# Order matters: VPs reference credentials, status lists are referenced
# by credentials, etc. The CLI emits in declaration order.

schema_version = 1

# ---------------------------------------------------------------------------
# Keys (one per seed). Output: {did, public_jwk, private_jwk} JSON.
# ---------------------------------------------------------------------------

[[fixtures]]
id   = "key_subject_alice"
kind = "key"
out  = "keys/subject_alice.json"
[fixtures.spec]
seed = "subject_alice"

[[fixtures]]
id   = "key_subject_bob"
kind = "key"
out  = "keys/subject_bob.json"
[fixtures.spec]
seed = "subject_bob"

