name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write     # GitHub Release
  packages: write     # ghcr.io image push

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/shadownet-protocol/conformance

jobs:
  gate:
    name: lint + tests gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Lint + mypy + pytest
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy
          uv run pytest

      - name: Build go-emit binary
        working-directory: fixtures/_regen/go-emit
        run: go build -o go-emit .

      - name: Cross-SDK fixture verification
        run: uv run shadownet-conformance-fixtures regen --check

      - name: Verify tag matches package version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/v}"
          pkg="$(uv run python -c 'import importlib.metadata as m; print(m.version("shadownet-conformance"))')"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::git tag v$tag does not match pyproject version $pkg"
            exit 1
          fi

  publish-image:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          {
            echo "tags=${IMAGE}:${tag},${IMAGE}:latest"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: action/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}

  github-release:
    name: Cut GitHub Release
    runs-on: ubuntu-latest
    needs: publish-image
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc.') || contains(github.ref_name, '-alpha.') || contains(github.ref_name, '-beta.') }}
          body: |
            ## Distribution

            - **Docker image**: `${{ env.IMAGE }}:${{ github.ref_name }}` (also tagged `:latest`)
            - **GitHub Action**: `uses: shadownet-protocol/conformance-action@${{ github.ref_name }}`
            - **From source** (uv): `uvx --from git+https://github.com/${{ github.repository }}@${{ github.ref_name }} shadownet-conformance --help`
